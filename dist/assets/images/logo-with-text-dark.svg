<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="420" viewBox="0 0 1800 420" role="img" aria-label="Block Lambda logo with wordmark">
  <defs>
    <mask id="block-cut">
      <rect width="320" height="320" fill="black"/>
      <rect x="40" y="60" width="220" height="220" rx="28" fill="white"/>
      <circle cx="150" cy="52" r="26" fill="white"/>
      <circle cx="278" cy="180" r="28" fill="white"/>
      <circle cx="150" cy="280" r="28" fill="black"/>
    </mask>
  </defs>
  <g transform="translate(0,20)">
    <rect x="0" y="0" width="320" height="320" fill="none"/>
